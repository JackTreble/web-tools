<!DOCTYPE html>
<html lang="en">
<head>

    <title>Tool Name | Free Browser-Based Utility | VibeCoded</title>
    <meta name="description" content="Describe the user problem solved, output format, and privacy behavior in plain language.">

    <link rel="stylesheet" href="common.css">

<body>

<div class="container">
    <header class="tool-header">
        <a href="index.html" class="back-link">&#8592; All Tools</a>
        <h1>&#9881;&#65039; Tool Name</h1>

        <div class="drop-hint">Click here or drag &amp; drop</div>

    <div id="errorMessage" class="error-message" role="alert" aria-live="polite"></div>

    <div id="workspace" class="workspace" aria-label="Tool workspace">
